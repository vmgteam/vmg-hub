let aT='tv', aS='Images', tvExp={}, tvCop={}, curImg=null, capOpen=false;

function filt(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  let list=[];
  if(aT==='vert') list=[...IMGS];
  else if(aT==='sq'){
    list=SQ_IMGS.map(sq=>{
      const ref=IMGS.find(i=>i.id===sq.ref)||{cp:'Caption coming soon.'};
      return{...sq,cp:ref.cp};
    });
  }
  else if(aT==='web') list=IMGS.filter(i=>i.ct==='web');
  else if(aT==='pur') list=IMGS.filter(i=>i.ct==='pur');
  if(q) list=list.filter(i=>i.nm.toLowerCase().includes(q)||i.cp.toLowerCase().includes(q));
  return list;
}

function render(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>`<button class="tab${aT===t.id?' on':''}" onclick="sT('${t.id}')">${t.l}</button>`).join('');
  const hasSub=aT==='vert'||aT==='sq';
  document.getElementById('stabs-wrap').innerHTML=hasSub?`<div class="stabs-wrap"><div class="stabs"><button class="stab${aS==='Images'?' on':''}" onclick="sS('Images')">Images</button><button class="stab${aS==='Videos'?' on':''}" onclick="sS('Videos')">Videos</button></div></div>`:'';
  document.getElementById('note').innerHTML=NOTES[aT]||'';
  document.querySelector('.search-wrap').style.display=aT==='tv'?'none':'block';

  if(aT==='tv'){
    document.getElementById('count').textContent='2 caption templates';
    document.getElementById('content').innerHTML=`<div class="tv-cards">${TV.map(tv=>{
      const isE=!!tvExp[tv.id], isC=!!tvCop[tv.id];
      return`<div class="tv-card"><div class="tv-ph"><div class="tv-ph-l">9:16 Vertical</div><div class="tv-ph-s">Filmed on your phone</div></div><div class="tv-body"><div class="tv-name">${tv.nm}</div><div class="tv-badges"><span class="badge ${tv.ct==='web'?'b-web':'b-pur'}">${tv.ct==='web'?'Webinar CTA':'Purchase CTA'}</span><span class="badge b-vid">Video</span></div><div class="tv-cap${isE?' open':''}">${tv.cp}</div><button class="xbtn" onclick="togTV('${tv.id}')">${isE?'Hide ▲':'See full caption ▼'}</button><button class="copy-btn${isC?' done':''}" onclick="copTV('${tv.id}')">${isC?'✓ Copied!':'Copy Caption'}</button></div></div>`;
    }).join('')}</div>`;
    return;
  }

  if(hasSub&&aS==='Videos'){
    document.getElementById('count').textContent='';
    document.getElementById('content').innerHTML=`<div class="soon">Product videos coming soon.</div>`;
    return;
  }
  const list=filt();
  document.getElementById('count').textContent=`${list.length} image${list.length!==1?'s':''}`;
  if(!list.length){document.getElementById('content').innerHTML=`<div class="empty">No images match that search.</div>`;return;}
  const tileClass = aT==='sq' ? 'tile sq-tile' : 'tile vert-tile';
  document.getElementById('content').innerHTML=`<div class="grid">${list.map(img=>`<div class="${tileClass}" onclick="openModal('${img.id}')"><img src="${img.src}" alt="${img.nm}" loading="lazy"><div class="tile-label">${img.nm}</div><span class="tile-cta ${img.ct==='web'?'cta-web':'cta-pur'}">${img.ct==='web'?'Webinar':'Purchase'}</span></div>`).join('')}</div>`;
}

function sT(id){aT=id;aS='Images';document.getElementById('search').value='';render()}
function sS(s){aS=s;render()}
function togTV(id){tvExp[id]=!tvExp[id];render()}
function copTV(id){
  const tv=TV.find(t=>t.id===id);if(!tv)return;
  navigator.clipboard.writeText(tv.cp).catch(()=>{});
  tvCop[id]=true;render();setTimeout(()=>{tvCop[id]=false;render()},2500);
}

function openModal(id){
  curImg=IMGS.find(i=>i.id===id);if(!curImg)return;
  capOpen=false;
  document.getElementById('modal-img').src=curImg.src;
  document.getElementById('modal-name').textContent=curImg.nm;
  document.getElementById('modal-badges').innerHTML=`<span class="badge ${curImg.ct==='web'?'b-web':'b-pur'}">${curImg.ct==='web'?'Webinar CTA':'Purchase CTA'}</span>`;
  document.getElementById('modal-cap').textContent=curImg.cp;
  document.getElementById('modal-cap').className='modal-cap';
  document.getElementById('modal-xbtn').textContent='See full caption ▼';
  document.getElementById('modal-copy').textContent='Copy Caption';
  document.getElementById('modal-copy').className='modal-copy';
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow='';
}

document.getElementById('modal').addEventListener('click', function(e){
  if(e.target===this) closeModal();
});

function toggleCap(){
  capOpen=!capOpen;
  document.getElementById('modal-cap').className='modal-cap'+(capOpen?' open':'');
  document.getElementById('modal-xbtn').textContent=capOpen?'Hide caption ▲':'See full caption ▼';
}

function doCopy(){
  if(!curImg)return;
  navigator.clipboard.writeText(curImg.cp).catch(()=>{
    const t=document.createElement('textarea');t.value=curImg.cp;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);
  });
  document.getElementById('modal-copy').textContent='✓ Copied!';
  document.getElementById('modal-copy').className='modal-copy done';
  setTimeout(()=>{
    document.getElementById('modal-copy').textContent='Copy Caption';
    document.getElementById('modal-copy').className='modal-copy';
  },2500);
}

function doSave(){
  if(!curImg)return;
  const btn=document.getElementById('modal-save');
  btn.textContent='Saving...';
  fetch(curImg.src)
    .then(r=>r.blob())
    .then(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=curImg.nm+'.jpeg';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),3000);
      btn.textContent='⬇ Save Image';
    })
    .catch(err=>{
      console.log('fetch error:',err);
      btn.textContent='⬇ Save Image';
    });
}

render();
