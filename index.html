let aT='tv',aS='Images',exp={},cop={},slides={};

const TABS=[{id:'tv',l:'Testimonial Videos'},{id:'vert',l:'Vertical',s:true},{id:'sq',l:'Square',s:true},{id:'web',l:'Webinar'},{id:'pur',l:'Purchase'}];

function isSq(){return aT==='sq';}

function filt(){
  const q=(document.getElementById('srch').value||'').toLowerCase();
  let list=[];
  if(aT==='tv') list=P.filter(p=>p.tp==='tv');
  else if(aT==='vert'||aT==='sq'){if(aS==='Images')list=P.filter(p=>p.tp==='img');else list=[];}
  else if(aT==='web') list=P.filter(p=>p.tp==='img'&&p.ct==='web');
  else if(aT==='pur') list=P.filter(p=>p.tp==='img'&&p.ct==='pur');
  if(q) list=list.filter(p=>p.nm.toLowerCase().includes(q)||p.cp.toLowerCase().includes(q)||(p.ca||'').toLowerCase().includes(q)||(p.sb||'').toLowerCase().includes(q));
  return list;
}

function imgBlock(p){
  const sq=isSq();
  const sqCls=sq?' sq':'';
  if(p.tp==='tv') return`<div class="img-ph${sqCls}"><div class="ph-l">9:16 Vertical</div><div class="ph-s">Filmed on your phone</div></div>`;
  if(!p.im||!p.im.length) return`<div class="img-ph${sqCls}"><div class="ph-l">Image coming soon</div></div>`;
  if(p.im.length===1){
    return`<div style="position:relative"><img class="single-img${sqCls}" src="${TH(p.im[0])}" alt="${p.nm}" loading="lazy"><div class="save-hint">Long-press to save</div></div>`;
  }
  const cur=slides[p.id]||0;
  const imgs=p.im.map((id,i)=>`<div class="carousel-slide${sqCls}"><img src="${TH(id)}" alt="${p.nm} ${i+1}" loading="lazy" style="width:100%;display:block;object-fit:cover;${sq?'aspect-ratio:1/1;':'aspect-ratio:9/16;'}max-height:340px"><div class="save-hint">Long-press to save</div></div>`).join('');
  const dots=p.im.map((_,i)=>`<div class="dot${i===cur?' on':''}"></div>`).join('');
  return`<div class="carousel"><div class="carousel-track" id="track-${p.id}" style="transform:translateX(-${cur*100}%)">${imgs}</div></div><div class="dots" id="dots-${p.id}">${dots}</div>`;
}

function render(){
  document.getElementById('pt').innerHTML=TABS.map(t=>`<button class="ptab${aT===t.id?' on':''}" onclick="sT('${t.id}')">${t.l}</button>`).join('');
  const hasSub=aT==='vert'||aT==='sq';
  document.getElementById('st').innerHTML=hasSub?`<div class="stabs"><button class="stab${aS==='Images'?' on':''}" onclick="sS('Images')">Images</button><button class="stab${aS==='Videos'?' on':''}" onclick="sS('Videos')">Videos</button></div>`:'';
  document.getElementById('tn').innerHTML=NOTES[aT]||'';
  if(hasSub&&aS==='Videos'){
    document.getElementById('cnt').textContent='';
    document.getElementById('cards').innerHTML=`<div class="card"><div class="soon"><b>Product videos coming soon.</b><br>Check back once assets are added.</div></div>`;
    return;
  }
  const list=filt();
  document.getElementById('cnt').textContent=`${list.length} asset${list.length!==1?'s':''}`;
  if(!list.length){document.getElementById('cards').innerHTML=`<div class="empty">No assets match that search.</div>`;return;}
  document.getElementById('cards').innerHTML=list.map(p=>{
    const isE=!!exp[p.id],isC=!!cop[p.id];
    const ctB=p.ct==='web'?'<span class="b bw">Webinar CTA</span>':'<span class="b bp">Purchase CTA</span>';
    const tpB=p.tp==='tv'?'<span class="b bv">Video</span>':'<span class="b bi">Image</span>';
    const drLink=p.im&&p.im.length?DR(p.im[0]):'#';
    return`<div class="card">${imgBlock(p)}<div class="cb"><div class="cn">${p.nm}</div>${p.sb?`<div class="cs">${p.sb}</div>`:''}<div class="brow">${tpB}${ctB}<span class="b bc">${p.ca}</span></div><div class="cap-wrap"><div class="cap${isE?' open':''}">${p.cp}</div></div><button class="xbtn" onclick="tog('${p.id}')">${isE?'Hide caption ▲':'See full caption ▼'}</button></div><div class="cf"><button class="cbtn${isC?' done':''}" onclick="doCopy('${p.id}')">${isC?'✓ Copied!':'Copy Caption'}</button><a class="dbtn" href="${drLink}" target="_blank">Drive</a></div></div>`;
  }).join('');
  initCarousels();
}

function initCarousels(){
  P.forEach(p=>{
    if(!p.im||p.im.length<2)return;
    const track=document.getElementById('track-'+p.id);
    if(!track)return;
    let startX=0,startY=0,dragging=false;
    track.parentElement.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;dragging=true;},{passive:true});
    track.parentElement.addEventListener('touchend',e=>{
      if(!dragging)return;
      const dx=e.changedTouches[0].clientX-startX;
      const dy=e.changedTouches[0].clientY-startY;
      if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>30){
        const cur=slides[p.id]||0;
        const next=dx<0?Math.min(cur+1,p.im.length-1):Math.max(cur-1,0);
        slides[p.id]=next;
        track.style.transform=`translateX(-${next*100}%)`;
        const dotsEl=document.getElementById('dots-'+p.id);
        if(dotsEl){dotsEl.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===next));}
      }
      dragging=false;
    },{passive:true});
  });
}

function sT(id){aT=id;aS='Images';slides={};render()}
function sS(s){aS=s;render()}
function tog(id){exp[id]=!exp[id];render()}
function doCopy(id){
  const p=P.find(x=>x.id===id);if(!p)return;
  navigator.clipboard.writeText(p.cp).then(()=>{cop[id]=true;render();setTimeout(()=>{cop[id]=false;render()},2500)}).catch(()=>{
    const ta=document.createElement('textarea');ta.value=p.cp;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    cop[id]=true;render();setTimeout(()=>{cop[id]=false;render()},2500);
  });
}
render();
</script>
