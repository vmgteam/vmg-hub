body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f2ef;color:#1a1a18;min-height:100vh;overscroll-behavior:none}

/* HEADER */
.header{background:#1a1a18;padding:16px 16px 12px;position:sticky;top:0;z-index:200}

/* STABS */
.stabs-wrap{background:#f2f2ef;padding:10px 14px;border-bottom:1px solid #e0e0dc}

/* NOTE */
.note{padding:10px 14px;font-size:12px;line-height:1.6;color:#555;background:#fffef5;border-bottom:1px solid #e8e8e0}

.count{padding:2px 14px 8px;font-size:11px;color:#aaa;font-weight:500}

@media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr)}}

const TV_CAPTIONS=[
  {id:'tv1',nm:'Testimonial Video — Webinar CTA',ct:'web',
  cp:`I was skeptical. Then something actually changed. We're hosting a free live online event this [day] — come see the full picture. ${W}`},
  {id:'tv2',nm:'Testimonial Video — Purchase CTA',ct:'pur',
  cp:`90 ingredients. Liposomal delivery — up to 6x absorption. Clinically studied. 30 day supply. Free account. See for yourself. ${PU}`},
];

const TABS_DEF=[
  {id:'tv',l:'Testimonial Videos'},
  {id:'vert',l:'Vertical',s:true},
  {id:'sq',l:'Square',s:true},
  {id:'web',l:'Webinar'},
  {id:'pur',l:'Purchase'},
];

const NOTES={
  tv:`<b>Filmed vertical on your phone.</b> Webinar posts: swap ${W}. Purchase posts: swap ${PU}. Facebook → first comment. Instagram & TikTok → bio via Linktree.`,
  vert:`<b>Vertical — 9:16 (1080×1920 px).</b> Tap any image to see full size and copy caption. Long-press to save to camera roll. Facebook → link in first comment. Instagram & TikTok → link in bio via Linktree.`,
  sq:`<b>Square — 1:1 (1080×1080 px).</b> Square crops coming soon. Tap any image to see full size and copy caption. Facebook → link in first comment. Instagram & TikTok → link in bio via Linktree.`,
  web:`All <b>Webinar CTA</b> posts. Tap any image to copy the caption.`,
  pur:`All <b>Purchase CTA</b> posts. Tap any image to copy the caption.`,
};

let aT='tv',aS='Images',tvExp={},tvCop={},modalCapOpen=false,currentCap='',modalCopDone=false;

function filt(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  let list=[];
  if(aT==='vert'||aT==='sq') list=[...IMGS];
  else if(aT==='web') list=IMGS.filter(i=>i.ct==='web');
  else if(aT==='pur') list=IMGS.filter(i=>i.ct==='pur');
  if(q) list=list.filter(i=>i.nm.toLowerCase().includes(q)||i.cp.toLowerCase().includes(q));
  return list;
}

function render(){
  // Tabs
  document.getElementById('tabs').innerHTML=TABS_DEF.map(t=>`<button class="tab${aT===t.id?' on':''}" onclick="sT('${t.id}')">${t.l}</button>`).join('');
  // Stabs
  const hasSub=aT==='vert'||aT==='sq';
  document.getElementById('stabs-wrap').innerHTML=hasSub?`<div class="stabs-wrap"><div class="stabs"><button class="stab${aS==='Images'?' on':''}" onclick="sS('Images')">Images</button><button class="stab${aS==='Videos'?' on':''}" onclick="sS('Videos')">Videos</button></div></div>`:'';
  // Note
  document.getElementById('note').innerHTML=NOTES[aT]||'';
  // Search visibility
  document.querySelector('.search-wrap').style.display=(aT==='tv'||aT==='web'||aT==='pur'||(hasSub&&aS==='Images'))?'block':'none';

  // Content
  if(aT==='tv'){
    document.getElementById('count').textContent='2 caption templates';
    document.getElementById('content').innerHTML=`<div class="tv-cards">${TV_CAPTIONS.map(tv=>{
      const isE=!!tvExp[tv.id],isC=!!tvCop[tv.id];
      return`<div class="tv-card"><div class="tv-ph"><div class="tv-ph-l">9:16 Vertical</div><div class="tv-ph-s">Filmed on your phone</div></div><div class="tv-body"><div class="tv-name">${tv.nm}</div><div class="tv-badges"><span class="badge ${tv.ct==='web'?'b-web':'b-pur'}">${tv.ct==='web'?'Webinar CTA':'Purchase CTA'}</span><span class="badge b-vid">Video</span></div><div class="tv-cap${isE?' open':''}">${tv.cp}</div><button class="xbtn" onclick="toggleTV('${tv.id}')">${isE?'Hide ▲':'See full caption ▼'}</button><button class="copy-btn${isC?' done':''}" onclick="copyTV('${tv.id}')">${isC?'✓ Copied!':'Copy Caption'}</button></div></div>`;
    }).join('')}</div>`;
    return;
  }

  if(hasSub&&aS==='Videos'){
    document.getElementById('count').textContent='';
    document.getElementById('content').innerHTML=`<div class="soon"><b>Product videos coming soon.</b>Check back once doTERRA assets are added.</div>`;
    return;
  }

  const list=filt();
  document.getElementById('count').textContent=`${list.length} image${list.length!==1?'s':''}`;
  if(!list.length){document.getElementById('content').innerHTML=`<div class="empty">No images match that search.</div>`;return;}

  document.getElementById('content').innerHTML=`<div class="grid">${list.map(img=>{
    const ctaCls=img.ct==='web'?'cta-web':'cta-pur';
    const ctaLbl=img.ct==='web'?'Webinar':'Purchase';
    return`<div class="tile" onclick="openModal('${img.id}')"><img src="${TH(img.did)}" alt="${img.nm}" loading="lazy" onerror="this.style.display='none'"><div class="tile-label">${img.nm}</div><span class="tile-cta ${ctaCls}">${ctaLbl}</span></div>`;
  }).join('')}</div>`;
}

function sT(id){aT=id;aS='Images';document.getElementById('search').value='';render()}
function sS(s){aS=s;render()}
function toggleTV(id){tvExp[id]=!tvExp[id];render()}
function copyTV(id){
  const tv=TV_CAPTIONS.find(t=>t.id===id);if(!tv)return;
  navigator.clipboard.writeText(tv.cp).catch(()=>{});
  tvCop[id]=true;render();setTimeout(()=>{tvCop[id]=false;render()},2500);
}

// MODAL
function openModal(id){
  const img=IMGS.find(i=>i.id===id);if(!img)return;
  currentCap=img.cp;
  modalCapOpen=false;
  modalCopDone=false;
  document.getElementById('modal-img').src=TH(img.did);
  document.getElementById('modal-name').textContent=img.nm;
  document.getElementById('modal-badges').innerHTML=`<span class="badge ${img.ct==='web'?'b-web':'b-pur'}">${img.ct==='web'?'Webinar CTA':'Purchase CTA'}</span>`;
  document.getElementById('modal-cap').textContent=img.cp;
  document.getElementById('modal-cap').className='modal-cap';
  document.getElementById('modal-xbtn').textContent='See full caption ▼';
  document.getElementById('modal-copy-btn').textContent='Copy Caption';
  document.getElementById('modal-copy-btn').className='modal-copy';
  document.getElementById('modal-save-btn').setAttribute('data-did', img.did);
  document.getElementById('modal-save-btn').setAttribute('data-nm', img.nm);
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow='hidden';
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('modal'))return;
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow='';
}

function toggleModalCap(){
  modalCapOpen=!modalCapOpen;
  document.getElementById('modal-cap').className='modal-cap'+(modalCapOpen?' open':'');
  document.getElementById('modal-xbtn').textContent=modalCapOpen?'Hide caption ▲':'See full caption ▼';
}

function modalCopy(){
  navigator.clipboard.writeText(currentCap).catch(()=>{});
  document.getElementById('modal-copy-btn').textContent='✓ Copied!';
  document.getElementById('modal-copy-btn').className='modal-copy done';
  setTimeout(()=>{
    document.getElementById('modal-copy-btn').textContent='Copy Caption';
    document.getElementById('modal-copy-btn').className='modal-copy';
  },2500);
}

render();

function saveImage(){
  event.stopPropagation();
  const btn=document.getElementById('modal-save-btn');
  const did=btn.getAttribute('data-did');
  const url=`https://drive.google.com/thumbnail?id=${did}&sz=w1200`;
  window.open(url,'_blank');
}

</script>
